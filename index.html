<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Do You Love Me 💜</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100dvh;
      background: #ede8f5;
      font-family: 'Kanit', sans-serif;
      overflow: hidden;
      touch-action: manipulation;
    }

    /* ── PAGES ── */
    .page {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1.5rem 1.2rem;
      gap: 0;
    }

    .page.active {
      display: flex;
    }

    /* ── CAT FRAME ── */
    .cat-frame {
      width: min(280px, 74vw);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 6px 28px rgba(91, 33, 182, 0.13);
      background: #d5c8ed;
      flex-shrink: 0;
      margin-bottom: 1.3rem;
    }

    .cat-frame img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ── MUSIC BUTTON ── */
    #music-btn {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 500;
      background: rgba(255, 255, 255, 0.7);
      border: 1.5px solid #c4b5fd;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
      box-shadow: 0 2px 10px rgba(139, 92, 246, 0.2);
      transition: transform 0.2s;
    }

    #music-btn:active {
      transform: scale(0.9);
    }

    /* ── QUESTION TEXT ── */
    .q-text {
      font-size: clamp(1.3rem, 5.5vw, 1.85rem);
      font-weight: 700;
      color: #5b21b6;
      margin-bottom: 1.5rem;
      line-height: 1.35;
    }

    /* ── BUTTONS ── */
    .btn-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    #btn-yes {
      background: #a78bfa;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-family: 'Kanit', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      padding: 0.85rem 2.4rem;
      box-shadow: 0 4px 20px rgba(139, 92, 246, 0.4);
      transition: font-size 0.4s cubic-bezier(.34, 1.56, .64, 1),
        padding 0.4s cubic-bezier(.34, 1.56, .64, 1),
        box-shadow 0.3s;
      white-space: nowrap;
      position: relative;
      z-index: 1;
    }

    #btn-yes:active {
      transform: scale(0.96);
    }

    #btn-no {
      background: #faf5eb;
      color: #a0956b;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-family: 'Kanit', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      padding: 0.75rem 1.8rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.07);
      transition: font-size 0.3s, padding 0.3s;
      white-space: nowrap;
    }

    /* ── PETAL CONFETTI ── */
    .petal {
      position: fixed;
      pointer-events: none;
      z-index: 50;
      border-radius: 50% 0 50% 0;
      animation: petalFall linear forwards;
    }

    @keyframes petalFall {
      0% {
        transform: translateY(-20px) rotate(0deg) scale(1);
        opacity: 1;
      }

      80% {
        opacity: 0.8;
      }

      100% {
        transform: translateY(105vh) rotate(520deg) scale(0.6);
        opacity: 0;
      }
    }

    /* ── YES OVERLAY ── */
    #yes-overlay {
      position: fixed;
      border-radius: 50px;
      background: #a78bfa;
      color: white;
      font-family: 'Kanit', sans-serif;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 200;
      will-change: transform, border-radius;
    }

    /* ── SUCCESS PAGE ── */
    #page-success .big-title {
      font-size: clamp(1.45rem, 5.5vw, 2rem);
      font-weight: 800;
      color: #5b21b6;
      margin-bottom: 1.1rem;
    }

    .gifts-row {
      display: flex;
      gap: clamp(1rem, 5vw, 2rem);
      margin: 0.6rem 0 0.3rem;
      justify-content: center;
    }

    .gift-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: transform 0.2s;
      animation: giftBounce 1.6s ease-in-out infinite;
      -webkit-user-select: none;
      user-select: none;
    }

    .gift-box:nth-child(2) {
      animation-delay: 0.22s;
    }

    .gift-box:nth-child(3) {
      animation-delay: 0.44s;
    }

    .gift-box:active {
      transform: scale(0.88) !important;
    }

    .gift-icon {
      font-size: clamp(2.2rem, 8vw, 3rem);
    }

    .gift-label {
      font-size: 0.68rem;
      color: #7c3aed;
      margin-top: 0.2rem;
      font-weight: 600;
    }

    @keyframes giftBounce {

      0%,
      100% {
        transform: translateY(0) rotate(-3deg);
      }

      50% {
        transform: translateY(-10px) rotate(3deg);
      }
    }

    .gift-hint {
      font-size: 0.82rem;
      color: #9d7dce;
    }

    .btn-restart {
      margin-top: 0.8rem;
      background: transparent;
      color: #9d7dce;
      border: 1.5px solid #c4aef0;
      border-radius: 50px;
      cursor: pointer;
      font-family: 'Kanit', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 0.45rem 1.4rem;
    }

    /* ── INNER PAGES (memory / letter) ── */
    .inner-page {
      display: none;
      position: fixed;
      inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      text-align: center;
      padding: 1.5rem 1rem 2rem;
      background: #ede8f5;
      z-index: 300;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .inner-page.open {
      display: flex;
    }

    .inner-page .inner-title {
      flex-shrink: 0;
      padding-top: 0.5rem;
    }

    .inner-title {
      font-size: clamp(1.25rem, 4.5vw, 1.6rem);
      font-weight: 700;
      color: #5b21b6;
      margin-bottom: 1.2rem;
    }

    /* polaroids — grid 2 columns */
    .polaroids {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(0.7rem, 3vw, 1.1rem);
      width: 100%;
      max-width: 400px;
      margin-bottom: 1.2rem;
    }

    /* รูปที่ 1 กว้างเต็ม row */
    .polaroid:nth-child(1) {
      grid-column: 1 / -1;
      transform: rotate(-1.5deg);
      animation-delay: 0s;
    }

    .polaroid:nth-child(2) {
      transform: rotate(-2deg);
      animation-delay: 0.12s;
    }

    .polaroid:nth-child(3) {
      transform: rotate(2deg);
      animation-delay: 0.24s;
    }

    .polaroid {
      background: white;
      border-radius: 8px;
      padding: 8px 8px 28px;
      box-shadow: 0 4px 18px rgba(91, 33, 182, 0.12);
      animation: polaDrift 0.5s cubic-bezier(.34, 1.56, .64, 1) both;
      transition: transform 0.2s;
    }

    .polaroid:active {
      transform: scale(0.97) rotate(0deg) !important;
    }

    .polaroid img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
      border-radius: 5px;
      background: #e0d4f7;
    }

    /* caption ใต้ polaroid */
    .polaroid .pcap {
      font-size: 0.68rem;
      color: #9d7dce;
      margin-top: 4px;
      font-weight: 600;
      text-align: center;
    }

    @keyframes polaDrift {
      0% {
        opacity: 0;
        transform: translateY(24px) scale(0.94);
      }

      100% {
        opacity: 1;
      }
    }

    .polaroid svg {
      width: 100%;
      aspect-ratio: 1;
      display: block;
      border-radius: 3px;
    }

    /* letter */
    .letter-card {
      background: white;
      border-radius: 20px;
      padding: 1.6rem 1.8rem 1.8rem;
      max-width: min(420px, 92vw);
      width: 100%;
      box-shadow: 0 4px 20px rgba(91, 33, 182, 0.1);
      text-align: left;
      font-size: clamp(0.88rem, 3.5vw, 1rem);
      color: #5b21b6;
      line-height: 1.9;
      animation: cardUp 0.5s cubic-bezier(.34, 1.56, .64, 1) both;
      flex-shrink: 0;
      word-break: break-word;
    }

    /* typewriter cursor */
    .tw-cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: #a78bfa;
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.7s step-end infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0;
      }
    }

    #letter-body p {
      margin-bottom: 0.75rem;
      min-height: 1.2em;
    }

    @keyframes cardUp {
      0% {
        opacity: 0;
        transform: translateY(24px) scale(0.96);
      }

      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .letter-card .lheart {
      font-size: 1.6rem;
      display: block;
      text-align: center;
      margin-bottom: 0.9rem;
    }

    .letter-card p {
      margin-bottom: 0.6rem;
    }

    .letter-card .sign {
      font-weight: 700;
      margin-top: 0.8rem;
    }

    .btn-back {
      margin-top: 1rem;
      background: #e0d4f7;
      color: #7c3aed;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-family: 'Kanit', sans-serif;
      font-weight: 600;
      font-size: 0.88rem;
      padding: 0.6rem 1.8rem;
    }

    /* gift-3 special message */
    #gift3-msg {
      background: white;
      border-radius: 20px;
      padding: 1.6rem 2rem;
      max-width: 340px;
      width: 100%;
      box-shadow: 0 4px 20px rgba(91, 33, 182, 0.1);
      animation: cardUp 0.5s cubic-bezier(.34, 1.56, .64, 1) both;
    }

    #gift3-msg .g3-title {
      font-size: 1.5rem;
      font-weight: 800;
      color: #5b21b6;
      margin-bottom: 0.8rem;
    }

    #gift3-msg ul {
      list-style: none;
      text-align: left;
    }

    #gift3-msg li {
      color: #7c3aed;
      font-size: 0.9rem;
      padding: 0.25rem 0;
    }

    #gift3-msg li::before {
      content: '💜 ';
    }

    /* ── SPLASH SCREEN ── */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: #ede8f5;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      transition: opacity 0.7s ease;
    }

    #splash.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .splash-card {
      background: white;
      border-radius: 28px;
      padding: 2rem 1.8rem 2.2rem;
      max-width: 380px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(139, 92, 246, 0.18);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .splash-gif {
      width: min(160px, 44vw);
      height: auto;
      margin-bottom: 1.1rem;
      animation: floatBob 2.5s ease-in-out infinite;
    }

    @keyframes floatBob {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    .splash-title {
      font-size: clamp(1.15rem, 4.5vw, 1.45rem);
      font-weight: 800;
      color: #5b21b6;
      margin-bottom: 0.6rem;
      line-height: 1.35;
    }

    .splash-sub {
      font-size: clamp(0.78rem, 3vw, 0.88rem);
      color: #9d7dce;
      font-weight: 400;
      line-height: 1.65;
      margin-bottom: 1.4rem;
      text-align: center;
    }

    /* loading dots */
    .loading-dots {
      display: flex;
      gap: 6px;
      margin-bottom: 1.4rem;
    }

    .loading-dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #c4b5fd;
      animation: dotPop 1.2s ease-in-out infinite;
    }

    .loading-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .loading-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes dotPop {

      0%,
      100% {
        transform: scale(1);
        background: #c4b5fd;
      }

      50% {
        transform: scale(1.5);
        background: #a78bfa;
      }
    }

    /* fingerprint button */
    #fp-btn {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      border: none;
      background: none;
      animation: fadeUp 0.6s cubic-bezier(.34, 1.56, .64, 1) both;
    }

    #fp-btn.show {
      display: flex;
    }

    .fp-ring {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ede8f5, #d4b4fe);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(167, 139, 250, 0.4);
      transition: transform 0.15s, box-shadow 0.15s;
      font-size: 2rem;
      animation: fpPulse 2s ease-in-out infinite;
    }

    #fp-btn:active .fp-ring {
      transform: scale(0.9);
      box-shadow: 0 2px 8px rgba(167, 139, 250, 0.3);
    }

    @keyframes fpPulse {

      0%,
      100% {
        box-shadow: 0 4px 16px rgba(167, 139, 250, 0.4);
      }

      50% {
        box-shadow: 0 4px 28px rgba(167, 139, 250, 0.8), 0 0 0 8px rgba(167, 139, 250, 0.12);
      }
    }

    .fp-label {
      font-size: 0.75rem;
      color: #9d7dce;
      font-weight: 600;
    }

    /* hearts decoration */
    .splash-hearts {
      position: absolute;
      pointer-events: none;
      font-size: 1rem;
      animation: heartFloat 3s ease-in-out infinite;
      opacity: 0.7;
    }

    @keyframes heartFloat {

      0%,
      100% {
        transform: translateY(0) rotate(-10deg);
        opacity: 0.7;
      }

      50% {
        transform: translateY(-14px) rotate(10deg);
        opacity: 1;
      }
    }
  </style>
</head>

<body>

  <!-- ═══ SPLASH ═══ -->
  <div id="splash">
    <div class="splash-card" style="position:relative">
      <!-- หัวใจลอย -->
      <span class="splash-hearts" style="top:12px;right:22px;animation-delay:0s">🌸</span>
      <span class="splash-hearts" style="top:30px;left:18px;animation-delay:0.8s;font-size:.8rem">✿</span>
      <span class="splash-hearts" style="bottom:60px;right:16px;animation-delay:1.4s;font-size:.75rem">🫧</span>

      <!-- 🐱 เปลี่ยน GIF ตัวละครได้เลย — ใส่ Kuromi หรืออะไรก็ได้ -->
      <img class="splash-gif" src="default-ask.gif" onerror="this.src='https://cataas.com/cat/gif'" alt="character">

      <p class="splash-title">มีเรื่องสำคัญอยากถาม... 🌷</p>
      <p class="splash-sub" id="splash-sub-text">กำลังเตรียมอะไรบางอย่าง<br>เพื่อน้องอยู่เลยนะ...</p>

      <!-- loading dots (หายหลังโหลดเสร็จ) -->
      <div class="loading-dots" id="splash-dots">
        <span></span><span></span><span></span>
      </div>

      <!-- fingerprint (โผล่หลังโหลดเสร็จ) -->
      <button id="fp-btn" onclick="enterMain()">
        <div class="fp-ring">🫰</div>
        <span class="fp-label">แตะเพื่อเปิดดู</span>
      </button>
    </div>
  </div>

  <!-- ═══ MUSIC ═══ -->
  <audio id="bg-music" loop>
    <!-- 🎵 เปลี่ยน URL เพลงได้เลย -->
    <source src="https://mayz.love/assets/do-you-luv-me/bgm.mp3" type="audio/mpeg">
  </audio>
  <button id="music-btn" onclick="toggleMusic()" title="เปิด/ปิดเพลง">🎵</button>

  <!-- ═══ PAGE: QUESTION ═══ -->
  <div class="page active" id="page-main">
    <div class="cat-frame">
      <img id="cat-question" src="cat.gif" alt="🐱">
    </div>
    <p class="q-text">เป็นแฟนกับพี่มั้ยย? 🤔</p>
    <div class="btn-row">
      <button id="btn-yes" onclick="sayYes()">เป็น!! 💕</button>
      <button id="btn-no" onclick="pressNo()">ไม่... 😢</button>
    </div>
  </div>

  <!-- ═══ PAGE: SUCCESS ═══ -->
  <div class="page" id="page-success">
    <p class="big-title">พี่รู้อยู่แล้ว!! 🎊🌸🎊</p>
    <div class="cat-frame">
      <img src="cat-shy.png" alt="🐱" onerror="this.onerror=null;this.src='https://placekitten.com/270/200'">
    </div>
    <div class="gifts-row">
      <div class="gift-box" id="gift-1" onclick="openGift(1)">
        <span class="gift-icon">📸</span>
        <span class="gift-label">ความทรงจำ</span>
      </div>
      <div class="gift-box" id="gift-2" onclick="openGift(2)">
        <span class="gift-icon">🎵</span>
        <span class="gift-label">เพลงของเรา</span>
      </div>
      <div class="gift-box" id="gift-3" onclick="openGift(3)">
        <span class="gift-icon">💌</span>
        <span class="gift-label">จดหมาย</span>
      </div>
    </div>
    <p class="gift-hint">แตะของขวัญเพื่อเปิด 🎀</p>
    <button class="btn-restart" onclick="restart()">เริ่มใหม่ ▾</button>
  </div>

  <!-- ═══ INNER: MEMORIES ═══ -->
  <div class="inner-page" id="inner-memory">
    <p class="inner-title">🎞️ ความทรงจำของเรา</p>
    <div class="polaroids">

      <!-- ✏️ รูปที่ 1 (กว้างเต็ม) — เปลี่ยน src และ caption ได้เลย -->
      <div class="polaroid">
        <img src="2.jpg" alt="ความทรงจำ 1" onerror="this.style.background='#e0d4f7';this.removeAttribute('src')">
        <p class="pcap">✨ กว่าจะได้สักรูป</p>
      </div>

      <!-- ✏️ รูปที่ 2 -->
      <div class="polaroid">
        <img src="4.jpg" alt="ความทรงจำ 2" onerror="this.style.background='#e0d4f7';this.removeAttribute('src')">
        <p class="pcap">💜 น่ารักเนอะ</p>
      </div>

      <!-- ✏️ รูปที่ 3 -->
      <div class="polaroid">
        <img src="3.jpg" alt="ความทรงจำ 3" onerror="this.style.background='#e0d4f7';this.removeAttribute('src')">
        <p class="pcap">555555</p>
      </div>

    </div>
    <button class="btn-back" style="flex-shrink:0" onclick="closeInner('inner-memory')">← กลับ</button>
  </div>

  <!-- ═══ INNER: GIFT 3 — จดหมาย ═══ -->
  <div class="inner-page" id="inner-gift3">
    <p class="inner-title">💌 จดหมายถึงน้องปราย</p>
    <div class="letter-card">
      <span class="lheart">💜</span>
      <div id="letter-body"></div>
    </div>
    <button class="btn-back" style="margin-top:1.2rem;flex-shrink:0" onclick="closeInner('inner-gift3')">← กลับ</button>
  </div>

  <!-- ═══ YES OVERLAY ═══ -->
  <div id="yes-overlay" style="display:none"></div>

  <script>
    // ── No button stages ──
    const NO_TEXTS = [
      'ไม่... 😶',
      'เดี๋ยวก่อน... แน่ใจมั้ย? 🫣',
      'เอาดีๆๆๆ... 😩',
      'ม่ายยยย... 😭',
      'คิดดูก่อนได้มั้ย 🙏',
      'น้องใจร้ายมากเลย 😤',
      'พี่รู้ว่าน้องรักพี่นิดนึง...',
    ];

    const YES_SIZES = [
      { fs: '1.1rem', pad: '0.85rem 2.4rem' },
      { fs: '1.3rem', pad: '0.9rem 2.8rem' },
      { fs: '1.65rem', pad: '1rem 3.2rem' },
      { fs: '2rem', pad: '1.1rem 3.6rem' },
      { fs: '2.45rem', pad: '1.2rem 4rem' },
      { fs: '3rem', pad: '1.35rem 4.5rem' },
      { fs: '3.7rem', pad: '1.5rem 5rem' },
    ];

    let noCount = 0;

    function pressNo() {
      noCount = Math.min(noCount + 1, NO_TEXTS.length - 1);

      const btnNo = document.getElementById('btn-no');
      btnNo.textContent = NO_TEXTS[noCount];
      if (noCount >= NO_TEXTS.length - 1) {
        // กดอีกครั้งค่อยหาย
        btnNo.onclick = () => { btnNo.style.display = 'none'; };
      }

      const s = YES_SIZES[noCount];
      const yes = document.getElementById('btn-yes');
      yes.style.fontSize = s.fs;
      yes.style.padding = s.pad;

      document.getElementById('cat-question').src = 'cat-sad.gif';

      spawnPetals(14);
      startMusic();
    }

    // ── Music ──
    let musicPlaying = false;

    function startMusic() {
      if (musicPlaying) return;
      const audio = document.getElementById('bg-music');
      audio.volume = 0.35;
      audio.play().then(() => {
        musicPlaying = true;
        document.getElementById('music-btn').textContent = '🔊';
      }).catch(() => { });
    }

    // ลอง autoplay ทันทีตอนโหลดหน้า
    window.addEventListener('load', () => { startMusic(); });

    // fallback: เล่นทันทีที่ผู้ใช้แตะครั้งแรกที่ splash
    document.addEventListener('touchstart', startMusic, { once: true });
    document.addEventListener('pointerdown', startMusic, { once: true });

    function toggleMusic() {
      const audio = document.getElementById('bg-music');
      if (audio.paused) {
        audio.play().catch(() => { });
        musicPlaying = true;
        document.getElementById('music-btn').textContent = '🔊';
      } else {
        audio.pause();
        musicPlaying = false;
        document.getElementById('music-btn').textContent = '🔇';
      }
    }

    // ── Petal confetti ──
    const PETAL_COLORS = ['#f9a8d4', '#e879f9', '#c4b5fd', '#fda4af', '#f0abfc', '#fbcfe8'];

    function spawnPetals(n) {
      for (let i = 0; i < n; i++) {
        const el = document.createElement('div');
        el.className = 'petal';
        const sz = 5 + Math.random() * 8;
        el.style.cssText = `
      left:${8 + Math.random() * 84}vw;
      top:-15px;
      width:${sz}px; height:${sz * 1.6}px;
      background:${PETAL_COLORS[Math.floor(Math.random() * PETAL_COLORS.length)]};
      animation-duration:${1.6 + Math.random() * 2.5}s;
      animation-delay:${Math.random() * 0.5}s;
    `;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 4500);
      }
    }

    // ── Splash ──
    const SPLASH_MESSAGES = [
      'กำลังเตรียมอะไรบางอย่าง<br>เพื่อน้องอยู่เลยนะ...',
      'ตั้งแต่มีน้อง <br>ทุกวันมันดูน่ารักแบบไม่รู้ตัว 🫶',
      'เลยอยากถาม...<br>จากใจจริงเลยว่า.... 🌷',
    ];
    let splashMsgIdx = 0;

    (function initSplash() {
      let i = 0;
      const interval = setInterval(() => {
        i++;
        if (i < SPLASH_MESSAGES.length) {
          document.getElementById('splash-sub-text').innerHTML = SPLASH_MESSAGES[i];
        } else {
          clearInterval(interval);
          // show fingerprint
          document.getElementById('splash-dots').style.display = 'none';
          document.getElementById('splash-sub-text').innerHTML = 'ถ้าอยากฟังคำถามนี้ต่อ แตะตรงนี้ได้เลยย 🫰';
          document.getElementById('fp-btn').classList.add('show');
        }
      }, 2600);
    })();

    function enterMain() {
      const splash = document.getElementById('splash');
      splash.classList.add('fade-out');
      startMusic();
      setTimeout(() => { splash.style.display = 'none'; }, 700);
    }

    // ── Say yes ──
    function sayYes() {
      const yes = document.getElementById('btn-yes');
      const rect = yes.getBoundingClientRect();

      const ov = document.getElementById('yes-overlay');
      ov.style.cssText = `
    display:flex; align-items:center; justify-content:center;
    left:${rect.left}px; top:${rect.top}px;
    width:${rect.width}px; height:${rect.height}px;
    border-radius:50px; font-size:1.1rem;
    transition:none;
  `;
      ov.textContent = 'เย้ะะ!! 💕';

      spawnPetals(45);

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          ov.style.transition = 'left .65s, top .65s, width .65s, height .65s, border-radius .65s, font-size .65s';
          ov.style.left = '0'; ov.style.top = '0';
          ov.style.width = '100vw'; ov.style.height = '100dvh';
          ov.style.borderRadius = '0'; ov.style.fontSize = '5rem';
        });
      });
      startMusic();

      setTimeout(() => { spawnPetals(55); }, 350);
      setTimeout(() => {
        ov.style.display = 'none';
        showPage('page-success');
      }, 900);
    }

    // ── Page navigation ──
    function showPage(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    // ── Inner pages ──
    // 🎵 เปลี่ยนลิงค์เพลงได้เลย
    const SONG_URL = 'https://youtu.be/uQiF1yOnzDg?list=RDuQiF1yOnzDg';

    const GIFT_INNERS = { 1: 'inner-memory', 3: 'inner-gift3' };

    function openGift(n) {
      const box = document.getElementById('gift-' + n);
      box.style.transform = 'scale(1.25) rotate(8deg)';
      setTimeout(() => { box.style.transform = ''; }, 220);

      if (n === 2) {
        // open song link in new tab
        setTimeout(() => window.open(SONG_URL, '_blank'), 200);
        spawnPetals(20);
        return;
      }

      setTimeout(() => {
        document.getElementById(GIFT_INNERS[n]).classList.add('open');
        spawnPetals(20);
        if (n === 3) startTypewriter();
      }, 200);
    }

    function closeInner(id) {
      document.getElementById(id).classList.remove('open');
      // reset typewriter so it plays again next open
      if (id === 'inner-gift3') {
        document.getElementById('letter-body').innerHTML = '';
        twDone = false;
      }
    }

    // ── Typewriter ──
    const LETTER_LINES = [
      'ตั้งแต่ที่คุยกันมา พี่มีความสุขมากๆเลยนะ',
      'ชอบที่ได้เห็นน้องยิ้ม ชอบเวลาน้องกินของอร่อย',
      'ชอบเวลาน้องซุ่มซ่าม ตอนที่น้องดีดๆก็ยังน่ารัก 5555',
      '',
      'พี่อยากเห็นและอยากอยู่กับน้องในทุกๆโมเม้นเลยนะ',
      'อยากเป็นคนที่ไม่ใช่แค่ได้เห็นน้องมีความสุข',
      'แต่อยากเป็นคนทำให้น้องมีความสุขเอง...',
      '',
      'เย้! น้องเป็นแฟนพี่แล้วนะะะ',
      'พี่จะดูแลน้องให้ดีที่สุด จะทำให้น้องยิ้มเย้อๆเลยย',
      '',
      '— พี่ รักน้องนะ —',
    ];

    let twDone = false;

    function startTypewriter() {
      if (twDone) return;
      twDone = true;
      const body = document.getElementById('letter-body');
      body.innerHTML = '';

      let lineIdx = 0, charIdx = 0;
      let currentP = null;
      let cursor = null;

      function nextChar() {
        // start new paragraph
        if (charIdx === 0) {
          currentP = document.createElement('p');
          if (lineIdx === LETTER_LINES.length - 1) currentP.className = 'sign';
          body.appendChild(currentP);
          cursor = document.createElement('span');
          cursor.className = 'tw-cursor';
          currentP.appendChild(cursor);
        }

        const line = LETTER_LINES[lineIdx];

        if (line === '') {
          // blank line = spacer, skip instantly
          lineIdx++; charIdx = 0;
          if (lineIdx < LETTER_LINES.length) setTimeout(nextChar, 80);
          return;
        }

        if (charIdx < line.length) {
          // insert char before cursor
          cursor.insertAdjacentText('beforebegin', line[charIdx]);
          charIdx++;
          // scroll letter card down smoothly
          body.closest('.letter-card').scrollTop = 9999;
          setTimeout(nextChar, line[charIdx - 1] === ' ' ? 80 : 58);
        } else {
          // line done
          lineIdx++; charIdx = 0;
          if (lineIdx < LETTER_LINES.length) {
            cursor.remove();
            setTimeout(nextChar, 500);
          } else {
            cursor.remove();
          }
        }
      }

      setTimeout(nextChar, 400);
    }

    // ── Restart ──
    function restart() {
      location.reload();
    }
  </script>
</body>

</html>
